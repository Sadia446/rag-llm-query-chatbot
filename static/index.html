<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG Query</title>
<style>
  :root {
    --bg: #fafafa;
    --panel: #ffffff;
    --panel-2: #f0f4f9;
    --border: #dfe1e5;
    --border-soft: #ecedef;
    --text: #1f1f1f;
    --muted: #5f6368;
    --muted-2: #9aa0a6;
    --accent: #4c8dff;
    --accent-2: #a56eff;
    --accent-3: #ff6b8b;
    --danger: #d93025;
    --radius: 28px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    color: var(--text);
    font-family: "Google Sans", -apple-system, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    background:
      radial-gradient(circle at 15% 20%, rgba(76, 141, 255, 0.10), transparent 40%),
      radial-gradient(circle at 85% 15%, rgba(165, 110, 255, 0.10), transparent 40%),
      radial-gradient(circle at 50% 85%, rgba(255, 107, 139, 0.08), transparent 45%),
      var(--bg);
    background-attachment: fixed;
  }

  .main {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .stage {
    width: 100%;
    max-width: 680px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .hero h1 {
    text-align: center;
    font-size: 30px;
    font-weight: 500;
    letter-spacing: -0.01em;
    margin: 0 0 36px 0;
    background: linear-gradient(90deg, var(--accent), var(--accent-2) 55%, var(--accent-3));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  /* ---------- Search bar ---------- */
  .search-bar {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 8px 6px 8px;
    display: flex;
    align-items: center;
    gap: 6px;
    box-shadow: 0 1px 6px rgba(32, 33, 36, 0.08);
    transition: box-shadow 0.15s ease, border-color 0.15s ease;
  }
  .search-bar:focus-within {
    box-shadow: 0 2px 10px rgba(32, 33, 36, 0.14);
    border-color: var(--border);
  }

  .icon-btn {
    background: transparent;
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--muted);
    flex-shrink: 0;
    transition: background 0.15s ease;
  }
  .icon-btn:hover { background: var(--panel-2); }
  .icon-btn svg { width: 20px; height: 20px; }

  textarea#query-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    font-family: inherit;
    font-size: 16px;
    color: var(--text);
    padding: 10px 4px;
    line-height: 1.5;
    max-height: 160px;
  }
  textarea#query-input::placeholder { color: var(--muted-2); }

  button#submit-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s ease, background 0.15s ease;
  }
  button#submit-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  button#submit-btn svg { width: 17px; height: 17px; }

  input[type="file"] { display: none; }

  /* ---------- Settings row (below the bar, minimal) ---------- */
  .settings-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 14px;
    flex-wrap: wrap;
  }
  .settings-row select,
  .settings-row input[type="number"] {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 12.5px;
    padding: 6px 12px;
    border-radius: 20px;
    outline: none;
    cursor: pointer;
  }
  .settings-row input[type="number"] { width: 56px; text-align: center; cursor: text; }
  .settings-row label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12.5px;
    color: var(--muted);
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 20px;
    cursor: pointer;
  }
  .settings-row label input { accent-color: var(--accent); }

  .upload-filename {
    font-size: 12px;
    color: var(--muted-2);
  }

  .status-line {
    margin-top: 16px;
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    min-height: 18px;
  }
  .status-line.error { color: var(--danger); }

  /* ---------- Result ---------- */
  .result { width: 100%; margin-top: 24px; display: none; }
  .result.visible { display: block; }
  .answer-card {
    background: var(--panel);
    border: 1px solid var(--border-soft);
    border-radius: 20px;
    padding: 22px 26px;
    box-shadow: 0 1px 6px rgba(32, 33, 36, 0.06);
  }
  .answer-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 10px;
  }
  .answer-text { font-size: 15px; line-height: 1.7; white-space: pre-wrap; color: var(--text); }

  .chunks-section { margin-top: 14px; display: none; }
  .chunks-section.visible { display: block; }
  .chunks-header {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--muted-2);
    font-weight: 600;
    margin-bottom: 10px;
    padding-left: 4px;
  }
  .chunk-card {
    background: var(--panel-2);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 8px;
  }
  .chunk-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .chunk-source { font-size: 12px; font-weight: 600; color: var(--accent); }
  .chunk-score { font-size: 11px; color: var(--muted-2); font-variant-numeric: tabular-nums; }
  .chunk-content { font-size: 13px; line-height: 1.6; color: var(--muted); }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }
</style>
</head>
<body>

<main class="main">
  <div class="stage">

    <div class="hero">
      <h1>Any new document to explore?</h1>
    </div>

    <form class="search-bar" id="query-form">
      <label class="icon-btn" for="pdf-input" title="Upload PDF">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </label>
      <input type="file" id="pdf-input" accept="application/pdf">

      <textarea id="query-input" rows="1" placeholder="Ask Rag" required></textarea>

      <button type="submit" id="submit-btn" title="Ask">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"></line>
          <polyline points="5 12 12 5 19 12"></polyline>
        </svg>
      </button>
    </form>

    <div class="settings-row">
      <select id="model-select" title="Model"></select>
      <select id="source-select" title="Document">
        <option value="">All documents</option>
      </select>
      <input type="number" id="k-input" min="1" max="15" value="5" title="Chunks to retrieve">
      <label>
        <input type="checkbox" id="show-chunks-toggle">
        Show context
      </label>
      <span class="upload-filename" id="upload-filename"></span>
    </div>

    <div class="status-line" id="status"></div>

    <div class="result" id="result">
      <div class="answer-card">
        <div class="answer-label">Answer</div>
        <div class="answer-text" id="answer"></div>
      </div>

      <div class="chunks-section" id="chunks-container">
        <div class="chunks-header">Retrieved Context</div>
        <div id="chunks-list"></div>
      </div>
    </div>

  </div>
</main>

<script>
  const modelSelect = document.getElementById("model-select");
  const sourceSelect = document.getElementById("source-select");
  const kInput = document.getElementById("k-input");
  const showChunksToggle = document.getElementById("show-chunks-toggle");
  const form = document.getElementById("query-form");
  const input = document.getElementById("query-input");
  const button = document.getElementById("submit-btn");
  const statusEl = document.getElementById("status");
  const resultEl = document.getElementById("result");
  const answerEl = document.getElementById("answer");
  const chunksContainer = document.getElementById("chunks-container");
  const chunksList = document.getElementById("chunks-list");
  const pdfInput = document.getElementById("pdf-input");
  const uploadFilename = document.getElementById("upload-filename");

  const DEFAULT_MODEL = "gemma4:31b-cloud";

  function setStatus(msg, isError = false) {
    statusEl.textContent = msg;
    statusEl.classList.toggle("error", isError);
  }

  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 160) + "px";
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      form.requestSubmit();
    }
  });

  async function loadModels() {
    try {
      const res = await fetch("/models");
      const data = await res.json();
      modelSelect.innerHTML = "";
      data.models.forEach((m) => {
        const opt = document.createElement("option");
        opt.value = m;
        opt.textContent = m;
        modelSelect.appendChild(opt);
      });
      if (data.models.includes(DEFAULT_MODEL)) {
        modelSelect.value = DEFAULT_MODEL;
      }
    } catch {
      modelSelect.innerHTML = `<option value="${DEFAULT_MODEL}">${DEFAULT_MODEL}</option>`;
    }
  }

  async function loadSources() {
    try {
      const res = await fetch("/sources");
      const data = await res.json();
      sourceSelect.querySelectorAll("option:not(:first-child)").forEach(o => o.remove());
      data.sources.forEach((s) => {
        const opt = document.createElement("option");
        opt.value = s;
        opt.textContent = s;
        sourceSelect.appendChild(opt);
      });
    } catch {
      // "All documents" still works
    }
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const query_text = input.value.trim();
    if (!query_text) return;

    button.disabled = true;
    resultEl.classList.remove("visible");
    setStatus("Thinking...");

    try {
      const res = await fetch("/query", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          query_text,
          model: modelSelect.value,
          k: parseInt(kInput.value, 10) || 5,
          source: sourceSelect.value || null
        })
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.detail || `Server error: ${res.status}`);
      }

      answerEl.textContent = data.response;

      chunksList.innerHTML = "";
      data.chunks.forEach((c) => {
        const div = document.createElement("div");
        div.className = "chunk-card";
        div.innerHTML = `
          <div class="chunk-meta">
            <span class="chunk-source">${c.source}</span>
            <span class="chunk-score">score ${c.score.toFixed(3)}</span>
          </div>
          <div class="chunk-content">${c.content.replace(/</g, "&lt;")}</div>
        `;
        chunksList.appendChild(div);
      });
      chunksContainer.classList.toggle("visible", showChunksToggle.checked);

      setStatus("");
      resultEl.classList.add("visible");
    } catch (err) {
      setStatus(err.message, true);
    } finally {
      button.disabled = false;
    }
  });

  showChunksToggle.addEventListener("change", () => {
    chunksContainer.classList.toggle("visible", showChunksToggle.checked);
  });

  pdfInput.addEventListener("change", async () => {
    const file = pdfInput.files[0];
    if (!file) return;

    uploadFilename.textContent = file.name;
    setStatus(`Indexing ${file.name}, this can take a minute.`);

    const formData = new FormData();
    formData.append("file", file);

    try {
      const res = await fetch("/upload", { method: "POST", body: formData });
      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.detail || "Upload failed");
      }

      setStatus(`Indexed ${data.filename}. It's now searchable.`);
      await loadSources();
    } catch (err) {
      setStatus(err.message, true);
    } finally {
      pdfInput.value = "";
    }
  });

  loadModels();
  loadSources();
</script>
</body>
</html>
