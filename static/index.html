<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG Query</title>
<style>
  :root {
    --bg: #f7f4ee;
    --panel: #ffffff;
    --panel-2: #f0ece2;
    --border: #e6e0d4;
    --border-soft: #edeadf;
    --text: #2b2621;
    --muted: #7a7266;
    --muted-2: #a49c8c;
    --accent: #c05f3c;
    --accent-soft: rgba(192, 95, 60, 0.1);
    --accent-dark: #a34d2e;
    --danger: #b3452f;
    --radius: 16px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .app { display: flex; min-height: 100vh; }

  /* ---------- Sidebar ---------- */
  .sidebar {
    width: 250px;
    flex-shrink: 0;
    border-right: 1px solid var(--border-soft);
    padding: 22px 16px;
    display: flex;
    flex-direction: column;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 9px;
    margin-bottom: 26px;
    padding: 0 4px;
  }
  .brand-mark { width: 26px; height: 26px; flex-shrink: 0; }
  .brand-text {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--text);
  }
  .sidebar h2 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--muted-2);
    margin: 0 0 10px 0;
    padding: 0 4px;
    font-weight: 600;
  }
  .history-list { display: flex; flex-direction: column; gap: 2px; overflow-y: auto; }
  .history-item {
    padding: 8px 10px;
    border-radius: 8px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .history-item:hover { background: var(--panel-2); color: var(--text); }
  .history-empty { color: var(--muted-2); font-size: 13px; padding: 0 6px; }
  .sidebar-footer {
    margin-top: auto;
    padding-top: 14px;
    border-top: 1px solid var(--border-soft);
    font-size: 11px;
    color: var(--muted-2);
    padding-left: 4px;
  }

  /* ---------- Main ---------- */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 24px;
    overflow-y: auto;
  }
  .center-stage {
    width: 100%;
    max-width: 680px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    flex: 1;
    padding: 64px 0 32px 0;
  }
  .hero { text-align: center; margin-bottom: 30px; }
  .hero-logo { width: 46px; height: 46px; margin: 0 auto 18px auto; display: block; }
  .hero h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 32px;
    font-weight: 500;
    letter-spacing: -0.01em;
    margin: 0 0 8px 0;
    color: var(--text);
  }
  .hero p { color: var(--muted); font-size: 14.5px; margin: 0; }

  /* ---------- Input card ---------- */
  .input-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 8px 10px 8px;
    box-shadow: 0 6px 24px rgba(60, 45, 30, 0.06);
  }
  form.query-form { display: flex; align-items: flex-end; gap: 8px; padding: 6px 6px 6px 16px; }
  textarea#query-input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 15.5px;
    font-family: inherit;
    resize: none;
    outline: none;
    padding: 11px 0;
    line-height: 1.5;
    max-height: 160px;
  }
  textarea#query-input::placeholder { color: var(--muted-2); }

  button#submit-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    width: 38px;
    height: 38px;
    border-radius: 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s ease, opacity 0.15s ease;
  }
  button#submit-btn:hover:not(:disabled) { background: var(--accent-dark); }
  button#submit-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  button#submit-btn svg { width: 16px; height: 16px; }

  /* ---------- Controls row ---------- */
  .controls-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 10px 2px 10px;
    flex-wrap: wrap;
    border-top: 1px solid var(--border-soft);
    margin-top: 4px;
    padding-top: 12px;
  }
  .chip-select {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 12.5px;
    padding: 6px 10px;
    border-radius: 20px;
    outline: none;
    cursor: pointer;
  }
  .chip-select:hover { color: var(--text); }
  input#k-input {
    width: 50px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 12.5px;
    padding: 6px 8px;
    border-radius: 20px;
    outline: none;
    text-align: center;
  }
  label.toggle-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12.5px;
    color: var(--muted);
    cursor: pointer;
    padding: 6px 10px;
    border-radius: 20px;
  }
  label.toggle-chip:hover { background: var(--panel-2); }
  label.toggle-chip input { accent-color: var(--accent); }

  .upload-chip { margin-left: auto; display: flex; align-items: center; gap: 6px; }
  .upload-chip label {
    font-size: 12.5px;
    color: var(--muted);
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    cursor: pointer;
    background: var(--panel-2);
  }
  .upload-chip label:hover { color: var(--text); }
  .upload-chip input[type="file"] { display: none; }
  .upload-filename {
    font-size: 11.5px;
    color: var(--muted-2);
    max-width: 100px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .status-line {
    margin-top: 14px;
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    min-height: 18px;
  }
  .status-line.error { color: var(--danger); }

  /* ---------- Result ---------- */
  .result { margin-top: 28px; display: none; }
  .result.visible { display: block; }
  .answer-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 26px;
    box-shadow: 0 6px 24px rgba(60, 45, 30, 0.05);
  }
  .answer-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 12px;
  }
  .answer-text { font-size: 15.5px; line-height: 1.7; white-space: pre-wrap; color: var(--text); }

  .chunks-section { margin-top: 16px; display: none; }
  .chunks-section.visible { display: block; }
  .chunks-header {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--muted-2);
    font-weight: 600;
    margin-bottom: 10px;
    padding-left: 2px;
  }
  .chunk-card {
    background: var(--panel-2);
    border: 1px solid var(--border-soft);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 8px;
  }
  .chunk-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .chunk-source { font-size: 12px; font-weight: 600; color: var(--accent); }
  .chunk-score { font-size: 11px; color: var(--muted-2); font-variant-numeric: tabular-nums; }
  .chunk-content { font-size: 13px; line-height: 1.6; color: var(--muted); }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }

  @media (max-width: 720px) {
    .sidebar { display: none; }
    .center-stage { padding-top: 32px; }
  }
</style>
</head>
<body>

<div class="app">

  <aside class="sidebar">
    <div class="brand">
      <svg class="brand-mark" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="g1" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#e0784f"/>
            <stop offset="1" stop-color="#a34d2e"/>
          </linearGradient>
        </defs>
        <path d="M20 2 L23.5 16.5 L38 20 L23.5 23.5 L20 38 L16.5 23.5 L2 20 L16.5 16.5 Z" fill="url(#g1)"/>
      </svg>
      <div class="brand-text">RAG Query</div>
    </div>
    <h2>History</h2>
    <div class="history-list" id="history">
      <div class="history-empty">No queries yet</div>
    </div>
    <div class="sidebar-footer">Local document intelligence</div>
  </aside>

  <main class="main">
    <div class="center-stage">

      <div class="hero">
        <svg class="hero-logo" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="g2" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
              <stop offset="0" stop-color="#e0784f"/>
              <stop offset="1" stop-color="#a34d2e"/>
            </linearGradient>
          </defs>
          <path d="M20 2 L23.5 16.5 L38 20 L23.5 23.5 L20 38 L16.5 23.5 L2 20 L16.5 16.5 Z" fill="url(#g2)"/>
        </svg>
        <h1>RAG Query</h1>
        <p>Ask a question and get an answer grounded in your indexed documents.</p>
      </div>

      <div class="input-card">
        <form class="query-form" id="query-form">
          <textarea id="query-input" rows="1" placeholder="Ask a question about your documents..." required></textarea>
          <button type="submit" id="submit-btn" title="Ask">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="19" x2="12" y2="5"></line>
              <polyline points="5 12 12 5 19 12"></polyline>
            </svg>
          </button>
        </form>

        <div class="controls-row">
          <select class="chip-select" id="model-select" title="Model"></select>
          <select class="chip-select" id="source-select" title="Document">
            <option value="">All documents</option>
          </select>
          <input type="number" id="k-input" min="1" max="15" value="5" title="Chunks to retrieve">
          <label class="toggle-chip">
            <input type="checkbox" id="show-chunks-toggle">
            Show context
          </label>

          <div class="upload-chip">
            <span class="upload-filename" id="upload-filename"></span>
            <label for="pdf-input" id="upload-label">+ Upload PDF</label>
            <input type="file" id="pdf-input" accept="application/pdf">
          </div>
        </div>
      </div>

      <div class="status-line" id="status"></div>

      <div class="result" id="result">
        <div class="answer-card">
          <div class="answer-label">Answer</div>
          <div class="answer-text" id="answer"></div>
        </div>

        <div class="chunks-section" id="chunks-container">
          <div class="chunks-header">Retrieved Context</div>
          <div id="chunks-list"></div>
        </div>
      </div>

    </div>
  </main>

</div>

<script>
  const modelSelect = document.getElementById("model-select");
  const sourceSelect = document.getElementById("source-select");
  const kInput = document.getElementById("k-input");
  const showChunksToggle = document.getElementById("show-chunks-toggle");
  const form = document.getElementById("query-form");
  const input = document.getElementById("query-input");
  const button = document.getElementById("submit-btn");
  const statusEl = document.getElementById("status");
  const resultEl = document.getElementById("result");
  const answerEl = document.getElementById("answer");
  const chunksContainer = document.getElementById("chunks-container");
  const chunksList = document.getElementById("chunks-list");
  const historyEl = document.getElementById("history");
  const pdfInput = document.getElementById("pdf-input");
  const uploadLabel = document.getElementById("upload-label");
  const uploadFilename = document.getElementById("upload-filename");

  let history = [];

  function setStatus(msg, isError = false) {
    statusEl.textContent = msg;
    statusEl.classList.toggle("error", isError);
  }

  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 160) + "px";
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      form.requestSubmit();
    }
  });

  async function loadModels() {
    try {
      const res = await fetch("/models");
      const data = await res.json();
      modelSelect.innerHTML = "";
      data.models.forEach((m) => {
        const opt = document.createElement("option");
        opt.value = m;
        opt.textContent = m;
        modelSelect.appendChild(opt);
      });
    } catch {
      modelSelect.innerHTML = '<option value="mistral">mistral</option>';
    }
  }

  async function loadSources() {
    try {
      const res = await fetch("/sources");
      const data = await res.json();
      sourceSelect.querySelectorAll("option:not(:first-child)").forEach(o => o.remove());
      data.sources.forEach((s) => {
        const opt = document.createElement("option");
        opt.value = s;
        opt.textContent = s;
        sourceSelect.appendChild(opt);
      });
    } catch {
      // "All documents" still works
    }
  }

  function renderHistory() {
    if (history.length === 0) {
      historyEl.innerHTML = '<div class="history-empty">No queries yet</div>';
      return;
    }
    historyEl.innerHTML = "";
    history.slice().reverse().forEach((q) => {
      const div = document.createElement("div");
      div.className = "history-item";
      div.textContent = q;
      div.title = q;
      div.addEventListener("click", () => {
        input.value = q;
        input.focus();
      });
      historyEl.appendChild(div);
    });
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const query_text = input.value.trim();
    if (!query_text) return;

    button.disabled = true;
    resultEl.classList.remove("visible");
    setStatus("Thinking...");

    try {
      const res = await fetch("/query", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          query_text,
          model: modelSelect.value,
          k: parseInt(kInput.value, 10) || 5,
          source: sourceSelect.value || null
        })
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.detail || `Server error: ${res.status}`);
      }

      answerEl.textContent = data.response;

      chunksList.innerHTML = "";
      data.chunks.forEach((c) => {
        const div = document.createElement("div");
        div.className = "chunk-card";
        div.innerHTML = `
          <div class="chunk-meta">
            <span class="chunk-source">${c.source}</span>
            <span class="chunk-score">score ${c.score.toFixed(3)}</span>
          </div>
          <div class="chunk-content">${c.content.replace(/</g, "&lt;")}</div>
        `;
        chunksList.appendChild(div);
      });
      chunksContainer.classList.toggle("visible", showChunksToggle.checked);

      history.push(query_text);
      renderHistory();

      setStatus("");
      resultEl.classList.add("visible");
    } catch (err) {
      setStatus(err.message, true);
    } finally {
      button.disabled = false;
    }
  });

  showChunksToggle.addEventListener("change", () => {
    chunksContainer.classList.toggle("visible", showChunksToggle.checked);
  });

  pdfInput.addEventListener("change", async () => {
    const file = pdfInput.files[0];
    if (!file) return;

    uploadFilename.textContent = file.name;
    uploadLabel.textContent = "Indexing...";
    setStatus(`Indexing ${file.name}, this can take a minute.`);

    const formData = new FormData();
    formData.append("file", file);

    try {
      const res = await fetch("/upload", { method: "POST", body: formData });
      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.detail || "Upload failed");
      }

      setStatus(`Indexed ${data.filename}. It's now searchable.`);
      await loadSources();
    } catch (err) {
      setStatus(err.message, true);
    } finally {
      uploadLabel.textContent = "+ Upload PDF";
      pdfInput.value = "";
    }
  });

  loadModels();
  loadSources();
</script>
</body>
</html>
